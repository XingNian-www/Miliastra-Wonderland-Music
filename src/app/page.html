<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Miliastra 远程监控</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#101211;color:#e7ece9;font-family:"Microsoft YaHei",system-ui,sans-serif}
button,input,select,textarea{font:inherit}
.shell{max-width:1480px;margin:0 auto;padding:14px}
.topbar{display:grid;grid-template-columns:250px minmax(0,1fr) auto;gap:10px;align-items:stretch;margin-bottom:10px}
.brand{border:1px solid #2d3530;background:#171b19;border-radius:8px;padding:9px 10px}
.brand h1{font-size:20px;line-height:1.2;margin:0;color:#f8faf9}
.brand p{margin:4px 0 0;color:#9aa6a0;font-size:12px}
.status-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.metric{border:1px solid #2d3530;background:#171b19;border-radius:8px;padding:8px 10px;min-height:58px}
.metric span{display:block;color:#9aa6a0;font-size:12px}
.metric strong{display:block;margin-top:5px;color:#f8faf9;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-actions{display:flex;gap:8px;align-items:stretch}
.layout{display:grid;grid-template-columns:minmax(0,1.85fr) 360px;gap:12px;align-items:start}
.monitor{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
.panel{border:1px solid #2d3530;background:#171b19;border-radius:8px;min-width:0;overflow:hidden}
.panel.wide{grid-column:1/-1}
.panel-head{height:36px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2d3530;padding:0 10px;gap:8px}
.panel h2{font-size:14px;margin:0;color:#86efac}
.panel small{color:#93a19a;white-space:nowrap}
.panel-body{padding:10px}
.scroll{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;line-height:1.45;white-space:pre-wrap;word-break:break-word;overflow:auto;min-height:116px;max-height:300px;color:#d6ddd9}
#monitorOcr{min-height:132px;max-height:210px}
#monitorLogs{min-height:260px;max-height:500px}
#monitorCommands{max-height:190px}
.queue-list{display:flex;flex-direction:column;gap:6px;min-height:116px;max-height:230px;overflow:auto}
.queue-item{display:grid;grid-template-columns:28px minmax(0,1fr) auto;gap:8px;align-items:center;border:1px solid #323b36;background:#111412;border-radius:8px;padding:7px}
.queue-index{color:#93a19a;text-align:right;font-variant-numeric:tabular-nums}
.queue-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-meta{color:#9aa6a0;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pending-item{display:grid;grid-template-columns:28px minmax(0,1fr);gap:8px;align-items:center;border:1px solid #323b36;background:#111412;border-radius:8px;padding:8px}
.sidebar{display:flex;flex-direction:column;gap:12px}
.controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.row{display:flex;gap:8px;align-items:center}
.row.wrap{flex-wrap:wrap}
.ocr-send{display:grid;grid-template-columns:minmax(0,1fr) 104px;gap:8px;border-top:1px solid #2d3530;margin-top:10px;padding-top:10px}
input,select,textarea{width:100%;border:1px solid #3a4540;background:#101211;color:#f3f6f4;border-radius:8px;padding:9px 10px;outline:none}
textarea{min-height:74px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:#2dd4bf}
.btn{border:1px solid #3a4540;background:#222821;color:#f3f6f4;border-radius:8px;padding:9px 10px;cursor:pointer;min-height:38px}
.btn:hover{background:#2b332d}
.btn.primary{background:#0f766e;border-color:#14b8a6;color:#fff}
.btn.primary:hover{background:#0d9488}
.btn.good{background:#166534;border-color:#1b7d3f;color:#fff}
.btn.warn{background:#7c2d12;border-color:#9a3412;color:#fff}
.btn.ghost{background:#111412}
.btn.small{min-height:32px;padding:6px 8px;font-size:12px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.result{border:1px solid #2d3530;background:#101211;border-radius:8px;padding:9px 10px;font-size:12px;line-height:1.45;white-space:pre-wrap;word-break:break-word;min-height:58px;max-height:180px;overflow:auto;color:#d6ddd9}
.history{display:flex;flex-direction:column;gap:6px;max-height:250px;overflow:auto}
.history-item{border-left:3px solid #22c55e;background:#111412;border-radius:8px;padding:7px 8px;font-size:12px}
.history-item.err{border-left-color:#ef4444}
.history-time{color:#93a19a;margin-right:6px}
.history-result{color:#d6ddd9;margin-top:3px;word-break:break-word}
.compact-form{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:8px}
.switch-line{display:flex;align-items:center;gap:8px;color:#aab5af;font-size:12px}
.switch-line input{width:auto}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:10;display:grid;grid-template-rows:auto minmax(0,1fr);padding:16px;gap:10px}
.modal-head{display:flex;justify-content:space-between;align-items:center;color:#f8faf9}
.modal-body{overflow:auto;text-align:center}
.modal-body img{max-width:none;height:auto;background:#000;border:1px solid #2d3530}
.hidden{display:none!important}
@media(max-width:1050px){.layout{grid-template-columns:1fr}.topbar{grid-template-columns:1fr}.status-strip{grid-template-columns:repeat(2,minmax(0,1fr))}.top-actions{justify-content:flex-start}.sidebar{display:grid;grid-template-columns:1fr 1fr}.monitor{grid-template-columns:1fr}}
@media(max-width:720px){.shell{padding:10px}.status-strip{grid-template-columns:1fr 1fr}.sidebar{display:flex}.controls,.two,.three,.compact-form,.ocr-send{grid-template-columns:1fr}.monitor{gap:10px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <h1>Miliastra 远程监控</h1>
      <p id="lastRefresh">等待刷新</p>
    </div>
    <div class="status-strip">
      <div class="metric"><span>服务</span><strong id="serviceState">未知</strong></div>
      <div class="metric"><span>播放</span><strong id="playerState">未知</strong></div>
      <div class="metric"><span>当前歌曲</span><strong id="songState">未读取</strong></div>
      <div class="metric"><span>待播 / 待执行</span><strong id="queueState">0 / 0</strong></div>
    </div>
    <div class="top-actions">
      <button class="btn" id="refreshToggle" onclick="toggleRefresh()">暂停刷新</button>
      <button class="btn primary" onclick="loadMonitor()">刷新</button>
    </div>
  </header>

  <main class="layout">
    <section class="monitor">
      <div class="panel wide">
        <div class="panel-head"><h2>OCR 聊天</h2><small id="ocrMeta">暂无采样</small></div>
        <div class="panel-body">
          <pre class="scroll" id="monitorOcr">暂无 OCR 内容</pre>
          <div class="ocr-send">
            <input id="consoleChatText" placeholder="发送到游戏聊天">
            <button class="btn primary" onclick="sendConsoleChat()">发送</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>待播队列</h2><small id="queueMeta">0 首</small></div>
        <div class="panel-body"><div class="queue-list" id="monitorQueue">队列为空</div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>待执行任务</h2><small id="pendingMeta">0 个</small></div>
        <div class="panel-body"><div class="queue-list" id="monitorPending">暂无任务</div></div>
      </div>

      <div class="panel wide">
        <div class="panel-head"><h2>事件日志</h2><small>实时</small></div>
        <div class="panel-body"><pre class="scroll" id="monitorLogs">暂无日志</pre></div>
      </div>

      <div class="panel wide">
        <div class="panel-head"><h2>命令记录</h2><small>最近 20 条</small></div>
        <div class="panel-body"><pre class="scroll" id="monitorCommands">暂无命令</pre></div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="panel">
        <div class="panel-head"><h2>播放控制</h2><small>常用</small></div>
        <div class="panel-body">
          <div class="controls">
            <button class="btn good" onclick="call('/play','POST')">继续</button>
            <button class="btn warn" onclick="call('/pause','POST')">暂停</button>
            <button class="btn" onclick="call('/skip-prev','POST')">上一首</button>
            <button class="btn" onclick="call('/skip-next','POST')">下一首</button>
            <button class="btn" onclick="loadStatus()">状态</button>
            <button class="btn" onclick="call('/queue/clear','POST')">清空队列</button>
          </div>
          <div class="row" style="margin-top:8px">
            <input id="volumeInput" value="80" inputmode="numeric" placeholder="0-100">
            <button class="btn primary" onclick="setVolume()">音量</button>
          </div>
          <div class="three" style="margin-top:8px">
            <button class="btn small" onclick="quickVolume(30)">30%</button>
            <button class="btn small" onclick="quickVolume(60)">60%</button>
            <button class="btn small" onclick="quickVolume(100)">100%</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>点歌</h2><small>排队执行</small></div>
        <div class="panel-body">
          <input id="keyword" placeholder="歌名 / 歌手 / 关键词">
          <div class="compact-form" style="margin-top:8px">
            <select id="sourceSelect">
              <option value="qqmusic" selected>QQ音乐</option>
              <option value="netease">网易云</option>
            </select>
            <label class="switch-line"><input id="preferAccompaniment" type="checkbox">伴奏</label>
          </div>
          <div class="controls" style="margin-top:8px">
            <button class="btn primary" onclick="remoteSong(false)">点歌</button>
            <button class="btn" onclick="remoteSong(true)">AI点歌</button>
            <button class="btn" onclick="queueAdd()">加入队列</button>
            <button class="btn" onclick="searchOnly()">搜索</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>队列操作</h2><small>待播队列</small></div>
        <div class="panel-body">
          <div class="row">
            <input id="removeIndex" inputmode="numeric" placeholder="删除序号">
            <button class="btn" onclick="queueRemove()">删除</button>
          </div>
          <div class="two" style="margin-top:8px">
            <button class="btn" onclick="loadQueue()">刷新队列</button>
            <button class="btn warn" onclick="call('/queue/clear','POST')">清空</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>游戏截图</h2><small>手动</small></div>
        <div class="panel-body">
          <button class="btn primary" style="width:100%" onclick="loadScreenshot()">获取截图</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>响应</h2><small>最近操作</small></div>
        <div class="panel-body"><div class="result" id="result">等待操作</div></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>接口记录</h2>
          <div>
            <button class="btn small ghost" onclick="loadHistory()">刷新</button>
            <button class="btn small ghost" onclick="clearHistory()">清空</button>
          </div>
        </div>
        <div class="panel-body"><div class="history" id="history">暂无记录</div></div>
      </div>
    </aside>
  </main>
</div>

<div class="modal hidden" id="screenshotModal">
  <div class="modal-head">
    <strong id="screenshotTitle">游戏截图</strong>
    <button class="btn small" onclick="closeScreenshot()">关闭</button>
  </div>
  <div class="modal-body"><img id="screenshotImage" alt="游戏截图"></div>
</div>

<script>
function $(id){return document.getElementById(id)}
const esc=(s)=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
const commandLabels={'/status':'状态','/play':'继续','/pause':'暂停','/skip-next':'下一首','/skip-prev':'上一首','/volume':'音量','/searchPlay':'点歌','/searchSource':'指定音源点歌','/search':'搜索','/open-scheme':'打开URI','/queue':'队列','/queue/add':'加入队列','/queue/remove':'删除队列','/queue/clear':'清空队列','/ai/search':'AI点歌','/chat/send':'控制台发言'}
const stMap={playing:'播放中',paused:'已暂停',stopped:'已停止',stoped:'已停止'}
const safeNum=(n)=>(n!=null&&isFinite(n)&&!isNaN(n))?Number(n):null
const pad=(n)=>String(parseInt(n)||0).padStart(2,'0')
const fmt=(s)=>{s=safeNum(s);return s!=null?(Math.floor(s/60)+':'+pad(s%60)):'??:??'}
const nowText=()=>new Date().toLocaleTimeString('zh-CN',{hour12:false})
let refreshPaused=false
let screenshotUrl=''
function setResult(value){$('result').textContent=typeof value==='string'?value:JSON.stringify(value,null,2)}
function sourceLabel(v){return v==='netease'?'网易':v==='qqmusic'?'QQ':v||'聚合'}
function queryText(q){const rows=Object.entries(q||{}).filter(([,v])=>v!=null&&String(v)!=='');return rows.length?' '+rows.map(([k,v])=>k+'='+v).join(' '):''}
function preferParam(){return $('preferAccompaniment').checked?'&preferAccompaniment=1':''}
function keyword(){return $('keyword').value.trim()}
function source(){return $('sourceSelect').value}
async function request(url,method){
  const r=await fetch(url,{method:method||'GET'})
  const text=await r.text()
  if(!r.ok)throw new Error(text||('HTTP '+r.status))
  const type=r.headers.get('content-type')||''
  if(type.includes('application/json')){try{return JSON.parse(text)}catch{return text}}
  return text
}
async function call(url,method){
  setResult('请求中...')
  try{
    const data=await request(url,method)
    if(url==='/status'&&typeof data==='object')renderPlayer(data)
    setResult(data)
  }catch(e){setResult('错误: '+e.message)}
  await Promise.allSettled([loadHistory(),loadMonitor()])
}
function renderPlayer(d){
  const title=[d.name,d.singer].filter(Boolean).join(' - ')
  $('playerState').textContent=stMap[d.status]||d.status||'未知'
  $('songState').textContent=title||'无歌曲'
  return title
}
async function loadStatus(){
  try{
    const d=await request('/status')
    const title=renderPlayer(d)
    setResult([
      '状态: '+($('playerState').textContent||'未知'),
      '歌曲: '+(title||'无'),
      '进度: '+fmt(d.progress)+' / '+fmt(d.duration),
      '音量: '+(safeNum(d.volume)!=null?Math.round(d.volume)+'%':'未知'),
      d.lyricLineText?'歌词: '+d.lyricLineText:''
    ].filter(Boolean).join('\n'))
  }catch(e){setResult('错误: '+e.message)}
  await loadHistory()
}
function setVolume(){call('/volume?volume='+encodeURIComponent($('volumeInput').value.trim()),'POST')}
function quickVolume(v){$('volumeInput').value=String(v);setVolume()}
function remoteSong(ai){
  const kw=keyword()
  if(!kw){setResult('请输入关键词');return}
  let url=(ai?'/ai/search':'/searchPlay')+'?keyword='+encodeURIComponent(kw)+preferParam()
  if(!ai&&source())url+='&source='+encodeURIComponent(source())
  call(url,'POST')
}
async function searchOnly(){
  const kw=keyword()
  if(!kw){setResult('请输入关键词');return}
  let url='/search?keyword='+encodeURIComponent(kw)
  if(source())url+='&source='+encodeURIComponent(source())
  call(url)
}
function queueAdd(){
  const kw=keyword()
  if(!kw){setResult('请输入关键词');return}
  let url='/queue/add?keyword='+encodeURIComponent(kw)+preferParam()
  if(source())url+='&source='+encodeURIComponent(source())
  call(url,'POST')
}
function queueRemove(){
  const raw=$('removeIndex').value.trim()
  const index=raw?Math.max(0,parseInt(raw,10)-1):0
  call('/queue/remove?index='+encodeURIComponent(index),'POST')
}
async function loadQueue(){await call('/queue')}
async function sendConsoleChat(){
  const text=$('consoleChatText').value.trim()
  if(!text){setResult('请输入发送内容');return}
  await call('/chat/send?text='+encodeURIComponent(text),'POST')
  $('consoleChatText').value=''
}
async function loadScreenshot(){
  setResult('截图中...')
  try{
    const r=await fetch('/screenshot?quality=88')
    if(!r.ok)throw new Error(await r.text()||('HTTP '+r.status))
    const blob=await r.blob()
    if(screenshotUrl)URL.revokeObjectURL(screenshotUrl)
    screenshotUrl=URL.createObjectURL(blob)
    $('screenshotImage').src=screenshotUrl
    $('screenshotTitle').textContent='游戏截图 '+nowText()
    $('screenshotModal').classList.remove('hidden')
    setResult('截图已获取')
  }catch(e){setResult('错误: '+e.message)}
}
function closeScreenshot(){
  $('screenshotModal').classList.add('hidden')
  $('screenshotImage').removeAttribute('src')
  if(screenshotUrl){URL.revokeObjectURL(screenshotUrl);screenshotUrl=''}
}
function renderHistory(items){
  const el=$('history')
  if(!Array.isArray(items)||!items.length){el.textContent='暂无记录';return}
  el.innerHTML=items.map((it)=>'<div class="history-item '+(it.ok?'':'err')+'"><div><span class="history-time">'+esc(it.time)+'</span><b>'+esc(commandLabels[it.command]||it.command)+'</b>'+esc(queryText(it.query))+'</div><div class="history-result">'+esc(it.result)+'</div></div>').join('')
}
function queueLine(it,i){
  const meta=[it.friendUsername,sourceLabel(it.source),it.preferAccompaniment?'伴奏':''].filter(Boolean).join(' / ')
  return '<div class="queue-item"><div class="queue-index">'+(i+1)+'</div><div><div class="queue-title">'+esc(it.keyword||'未命名')+'</div><div class="queue-meta">'+esc(meta||'普通点歌')+'</div></div><button class="btn small ghost" onclick="removeQueueIndex('+i+')">删除</button></div>'
}
function pendingLine(text,i){
  return '<div class="pending-item"><div class="queue-index">'+(i+1)+'</div><div class="queue-title">'+esc(text)+'</div></div>'
}
function removeQueueIndex(index){$('removeIndex').value=String(index+1);queueRemove()}
function renderMonitor(d){
  $('serviceState').textContent=d.status||'未知'
  const q=Array.isArray(d.queue)?d.queue:[]
  const pending=Array.isArray(d.pendingTasks)?d.pendingTasks:[]
  $('queueState').textContent=q.length+' / '+pending.length
  $('queueMeta').textContent=q.length+' 首'
  $('pendingMeta').textContent=pending.length+' 个'
  const o=d.ocr
  if(o){
    $('ocrMeta').textContent='markers '+o.markers+' / total '+o.totalMs+'ms'
    $('monitorOcr').textContent=(o.messages||[]).join('\n')||'暂无 OCR 文本'
  }else{
    $('ocrMeta').textContent='暂无采样'
    $('monitorOcr').textContent='暂无 OCR 内容'
  }
  $('monitorQueue').innerHTML=q.length?q.map(queueLine).join(''):'队列为空'
  $('monitorPending').innerHTML=pending.length?pending.map(pendingLine).join(''):'暂无任务'
  const logs=Array.isArray(d.logs)?d.logs:[]
  $('monitorLogs').textContent=logs.length?logs.slice(-160).join('\n'):'暂无日志'
  const c=Array.isArray(d.commands)?d.commands:[]
  $('monitorCommands').textContent=c.length?c.slice(-20).join('\n'):'暂无命令'
  $('lastRefresh').textContent=(refreshPaused?'已暂停 ':'最后刷新 ')+nowText()
}
async function loadMonitor(){
  try{renderMonitor(await request('/monitor'))}
  catch(e){$('serviceState').textContent='监控失败';$('lastRefresh').textContent=e.message}
}
async function loadHistory(){
  try{renderHistory(await request('/history'))}
  catch(e){$('history').textContent='读取记录失败: '+e.message}
}
async function clearHistory(){
  try{setResult(await request('/clear-history','POST'))}
  catch(e){setResult('错误: '+e.message)}
  await loadHistory()
}
function toggleRefresh(){
  refreshPaused=!refreshPaused
  $('refreshToggle').textContent=refreshPaused?'继续刷新':'暂停刷新'
  $('lastRefresh').textContent=refreshPaused?'已暂停 '+nowText():'最后刷新 '+nowText()
  if(!refreshPaused)loadMonitor()
}
loadMonitor()
loadHistory()
loadStatus()
setInterval(()=>{if(!refreshPaused)loadMonitor()},1000)
</script>
</body>
</html>
