# 海龟汤题库示例。正式题库请命名为 turtle_soup.yaml，且不会被 Git 提交。
# 每次开局都会重新读取并严格校验整个文件；任一题缺字段或 ID 重复都会拒绝开局。
题目:
  - id: example-001
    标题: 关灯之后
    汤面: 一个男人每天睡前都会关灯。某天关灯后，他发现自己害死了很多人。
    汤底: "男人是值守海岸灯塔的管理员，夜里工作、白天睡觉。他通常等到日出、海上已经不再需要灯光指引时，才在睡前关闭灯塔顶部的航标灯。事发那夜，他误判了时间，在天亮前便关闭航标灯并入睡。黑暗中的多艘船因此失去辨认航道和危险水域的重要指引，其中一艘撞上礁石沉没，船上多人在这场海难中死亡。男人醒来后从事故消息和熄灯记录确认，正是自己过早关灯造成了海难。他本人没有死亡，也没有杀人意图；这是由他的失误引发的意外事故。"
    裁决备注: "核心真相：男人是昼夜作息颠倒的灯塔管理员，本应在日出后才关闭灯塔顶部用于指引船只的航标灯，却误在天亮前熄灯，使船只在黑暗中失去指引、触礁沉没并造成多人死亡。主持裁决：男人是灯塔管理员吗？=是（他负责值守并按时开关灯塔的航标灯。）；男人夜间工作、白天睡觉吗？=是（所以日出后关灯才是他通常的睡前动作。）；他每天关灯通常都会害死人吗？=否（正常情况下，他等到日出后才熄灯，此时船只已不再依赖灯光指引。）；事发时他是在天亮前过早关灯吗？=是（误判时间使航标灯在仍被船只需要时熄灭。）；关闭的是真实存在的灯光吗？=是（它是灯塔顶部用于夜间航行指引的航标灯。）；关闭的是普通住宅内部或卧室的灯吗？=否（灯位于灯塔顶部并服务海上航行，不是住宅照明。）；关闭的是自己家或别人家的生活用灯吗？=否（它属于航行保障设施，不以住宅照明为用途。）；关闭的是路灯吗？=否（它是灯塔航标灯。）；可以把它笼统称为房子外面的灯吗？=部分正确（灯具位于塔体顶部、处于室外，但“房子外面的灯”遗漏了它是航标设施这一关键性质。）；关灯导致了那些人的死亡吗？=是（过早熄灯使船只失去指引，随后触礁沉没并造成死亡。）；死者死于船只事故或海难吗？=是（他们在船只触礁沉没的事故中死亡。）；死者是否有伤口重要吗？=无关（汤底只确定他们死于海难，具体是溺亡还是受伤致死不影响机关。）；男人故意制造事故或故意杀人吗？=否（他误判时间并过早关灯，没有杀人意图。）；男人本人死了吗？=否（他在睡醒后得知事故，并通过消息和记录确认后果。）；除男人和某一名死者外还有其他人吗？=是（海难造成多人死亡，也涉及同船的其他人员。）；提问玩家是否认识死者重要吗？=无关（玩家与死者的私人关系不参与故事。）；故事涉及轮回或超自然力量吗？=否（全部因果都来自误操作、航标熄灭和船只触礁。）"
    启用: true
  - id: "soup-000001"
    标题: "一夜青"
    汤面: "回村办丧事，哥哥催当天封井。父亲下井检修时，绞盘上卡住井绳的木杆沿一圈齐痕折断，他坠亡。村规要求断气后现砍柳枝作哭丧杖；次日杖上却已有分叉白根，村人称亡者催青。它的黄芽蜷向一侧，根部有平直水线。杖顶还有与绞盘方孔同大的油黑压痕，奶奶看完便拦人封井报警。"
    汤底: "哥哥早在父亲死前就把这根柳枝泡好，并把它做成了卡住绞盘、防止井绳下滑的木杆。当地哭丧杖只能于断气后现砍，而次日便出现的分叉白根不可能是一夜长成，证明他预先备丧；所谓亡者催青只是自然生根被误读。黄芽全向一侧，是枝条长期固定在暗处、只受侧面微光；根部平直水线则证明它曾竖泡在水缸中保活。杖顶与绞盘方孔同大的油黑压痕，是枝端被削方后插进抹有黑色润滑油的绞盘方孔留下的。哥哥又绕着孔口处的枝条锯出一圈浅槽；父亲悬在井中时，木杆便沿那圈浅槽断裂。事后他取回较长断段冒充新砍的哭丧杖，泡水正是为了让预先取下的木杆仍显得新鲜。哥哥催着当天封井，是想把仍卡在方孔内的短段连绞盘封进水泥。奶奶因此报警，警方从井中取出与哭丧杖木纹连续的断段，证实坠井并非意外。"
    裁决备注: "核心真相：哥哥把提前泡活并绕圈锯出浅槽的柳枝先充作卡住老井绞盘的木杆，制造父亲坠亡，再将长断段冒充死后新砍的哭丧杖，根芽、水线、油痕和断纹反而暴露了预谋。主持裁决：柳杖生根是亡者显灵吗？=否（白根是柳枝被提前泡水后自然形成的。）；村规规定的砍枝时间重要吗？=是（它限定了正常哭丧杖最早只能在父亲断气后砍取。）；哥哥的柳枝在父亲死亡前就被砍下了吗？=是（分叉白根、侧弯黄芽和平直水线共同证明它曾被长期竖泡。）；哭丧杖与断裂的绞盘木杆来自同一根柳枝吗？=是（哭丧杖就是木杆折断后被取回的长段。）；卡住绞盘的木杆是因老化自然折断的吗？=否（整齐的一圈浅槽是哥哥预先锯出的，使木杆受力时恰好从那里断裂。）；杖顶的油黑压痕来自绞盘吗？=是（削方枝端插入沾有黑色润滑油的方孔后，留下了同形压痕。）；父亲在下井前已经死亡吗？=否（他活着悬入井中，木杆断裂后才坠亡。）；哥哥催封井是在掩埋证据吗？=是（短断段仍卡在方孔内，封入水泥便难以取出比对。）；奶奶报警只是因为相信禁忌吗？=否（她依据砍枝时间与可以查证的柳枝生长、绞盘痕迹识别出了预谋。）；哥哥是否亲手把父亲推下井？=否（他通过预先锯出浅槽的绞盘木杆制造了坠落。）；必须知道哥哥的具体杀人动机才能还原吗？=无关（题面物证足以还原预谋与方法，具体动机不参与机关。）；是否存在未提及的同谋或陌生人？=否（全部关键行为均由哥哥完成。）"
    启用: true
  - id: "soup-000002"
    标题: "余味"
    汤面: "为赶走隔壁的鱼腥味，我在厨房装了大功率排风扇，它反而从储物间的旧通风口吸来更浓的腥味。开到最大时，通风口上的纸巾向我鼓起。随后墙后热水器的火声时高时低，通风口里传来孩子咳嗽。刷墙那晚，我住进旅馆，却让风扇整夜散味。次日隔壁一家身亡，事故调查员先封存了我的风扇。"
    汤底: "两户并非独立住宅，而是一套旧房违规分隔后仍共用一个让空气进入房间的百叶通风口；我家的大功率排风扇不断把空气抽到室外，于是会隔着通风口从邻居家吸气，还让邻居热水器本应排到室外的废气倒流回屋内。“它反而从储物间的旧通风口吸来更浓的腥味”说明空气正由隔壁流向我家。“通风口上的纸巾向我鼓起”再次说明风扇正在从隔壁吸气，也排除了漆气被吹过去。“随后墙后热水器的火声时高时低，通风口里传来孩子咳嗽”把燃烧异常与刺激反应连在一起：废气倒流已经扰乱火焰并把废气送回室内。“刷墙那晚，我住进旅馆，却让风扇整夜散味”使这种吸气状态在我离屋期间持续；隔壁用热水后，含一氧化碳的废气不断回流，一家人相继昏迷身亡。“次日隔壁一家身亡，事故调查员先封存了我的风扇”是因热水器排气口留有废气倒流的痕迹，死亡可直接连回这台风扇，但我并无杀意。"
    裁决备注: "核心真相：违规分隔住宅的共用百叶通风口让大功率排风扇从邻居家吸气，进而把邻居燃气热水器的有毒废气拉回室内。主持裁决：两户原本属于同一套住宅吗？=是（房屋只被改出了名义边界，百叶通风口没有被隔断。）；储物间的旧百叶通风口仍贯通两户空气吗？=是（气味、纸巾方向和咳嗽声都证明它仍是有效通道。）；风扇开启后，空气是从隔壁流向叙述者家吗？=是（腥味被吸来、纸巾向叙述者鼓起，均指向这一流向。）；鱼腥味本身会致命吗？=否（它只是显示空气流向的线索。）；大功率排风扇与热水器必须接在同一根管道上吗？=否（二者没有直接接管；只要两户空气相通，风扇形成的吸力也足以让隔壁废气倒流。）；粉刷产生的漆气毒死了隔壁一家吗？=否（气流方向与此相反，漆气被排风扇排向室外。）；隔壁热水器是致命气体的来源吗？=是（老式燃气热水器的废气倒流时，燃烧废气会留在室内。）；火声变化和孩子咳嗽都是此前的危险预兆吗？=是（前者表示火焰受废气倒流影响，后者表示刺激性燃烧废气已经溢出。）；隔壁一家的直接死因是一氧化碳中毒吗？=是（持续使用热水时，含一氧化碳的废气不断回流。）；叙述者住进旅馆是其没有中毒的原因之一吗？=是（风扇整夜从隔壁吸气时，叙述者并不在家。）；叙述者故意让邻居中毒吗？=否（这是由错误隔墙和强力排风共同造成的意外。）；调查员封存风扇是因为电机起火吗？=否（风扇没有引发火灾，它把室内空气抽走，是造成废气倒流的原因。）；隔壁炖的是哪一种鱼重要吗？=无关（只要气味可被辨认并随气流传播即可。）；事件需要超自然因素解释吗？=否（全部现象均由违规隔墙、排风扇从隔壁吸气和燃气废气倒流造成。）"
    启用: true
  - id: "soup-000003"
    标题: "达标"
    汤面: "父亲中风后，逢周一、三、五仍有车来接。康复师摆出杯子和积木，我全收走，只留“是”“否”软垫。每次问话都换左右，姓名或日期答错便作废。第七天，我十次问他还要不要周一的治疗，他都按“否”；我取消接送，却备好止痛药和擦湿口腔的棉棒。五天后父亲去世，我写：康复达标。"
    汤底: "隐藏前提是，父亲早已每周三次接受透析，也就是用机器替不能工作的肾脏清理血液，才能维持生命；中风后他意识清楚，却无法可靠说话。这场“康复”是为了让他重新表达是否继续透析。逢周一、三、五来接他的车正是透析接送。杯子和积木不服务于这次目标，“是”“否”软垫构成无需说话的选择。每次换左右是为排除固定按一侧；姓名、日期题答错便作废，是用已知答案确认理解力。十次都拒绝周一的治疗，证明意愿稳定，医疗团队说明停止这种治疗会致死并确认他理解后，才停止治疗。我取消接送后，止痛药只用于减轻痛苦，棉棒用来湿润口腔、缓解口干。五天后他因肾脏停止工作而去世。“康复达标”指恢复了选择权，照护者的善意代价，是尊重清醒的父亲走向死亡。"
    裁决备注: "核心真相：用不断调换左右的“是／否”软垫、已知答案和重复选择，验证无法可靠说话的父亲确实想停止透析，也就是停止用机器替肾脏清理血液的维持生命治疗。主持裁决：父亲中风前就在接受固定的维持生命治疗吗？=是（他早已每周三次接受透析，也就是用机器替肾脏清理血液。）；周一、三、五的频率重要吗？=是（这是他一直前往治疗的固定日期，也是锁定治疗种类的线索。）；接送车是送父亲去做透析的吗？=是（取消接送意味着不再前往下一次透析。）；中风使父亲失去了意识吗？=否（他意识清楚，主要障碍是无法可靠地用语言表达。）；杯子和积木藏有致命机关吗？=否（它们只是常规动作康复用品，并非这次训练的真正目标。）；“是”“否”软垫是替代语言的沟通工具吗？=是（父亲可以用按压软垫表达回答。）；不断调换软垫左右位置是为了防止固定按一侧吗？=是（这样可排除中风后总偏向一侧的动作、习惯动作或无意识误按。）；姓名和日期问题是在检验父亲是否理解提问吗？=是（这些问题有能判断对错的答案，答错就不能把当轮选择视为可靠表达。）；重复询问十次是为了证明他的意愿稳定吗？=是（稳定且不受软垫位置影响的回答，才能被医疗团队认可为真实选择。）；叙述者在诱导父亲选择“否”吗？=否（换位、已知答案和重复询问恰恰用于排除诱导与偶然误按。）；父亲知道停止透析会导致死亡吗？=是（医疗团队说明了后果，并确认他能够理解。）；父亲是自主拒绝继续透析的吗？=是（这正是整套沟通训练需要证明的关键。）；止痛药直接造成了父亲死亡吗？=否（药物只是减轻停止治疗后的不适，直接死因是肾脏停止工作。）；这属于给父亲实施主动安乐死吗？=否（没有施用致死手段，而是尊重能够理解后果并自己作决定的人拒绝维持生命治疗。）；“康复达标”是指父亲恢复了行动能力吗？=否（达标的是恢复可靠表达医疗选择的能力。）；遗产或保险是叙述者的动机吗？=无关（核心冲突是照护者对父亲自主决定的尊重及其代价。）"
    启用: true
  - id: "soup-000004"
    标题: "余程"
    汤面: "弟弟骑电动车送夜宵后失联。防盗平台显示“车辆轨迹”继续向城西：电量仍是82%，途中跨过电动车禁行高架；路口照片中，号牌与轿车并排时高过车顶，始终斜挂着。轨迹终点是垃圾转运站，他落在小巷的头盔沾着垃圾渗出的酸臭液体，我立刻报警，要求转运站停止倒垃圾。"
    汤底: "防盗平台的“车辆轨迹”只是路口摄像机识别到号牌的位置，并不证明弟弟正骑着车。垃圾车在小巷撞死弟弟，司机为逃责，用车尾抬起垃圾桶的升降架把遗体和电动车一并塞进车斗；装载时号牌被挂钩勾下，斜卡在升降架高处，头盔则滚落并沾上垃圾渗出的液体。车的电量仍是82%，符合电动车断电后被当作货物运走；途中跨过电动车禁行高架，是因为带着号牌的垃圾车可以驶过那里；那块号牌与轿车并排时高过车顶，始终斜挂着，说明它附在高大车辆外部；终点是垃圾转运站，因为那里正是垃圾车运送垃圾的终点；他遗落在小巷的头盔又沾着垃圾渗出的酸臭液体，是因头盔贴近过垃圾车后部，也证明同一辆车到过碰撞现场。警方据此在倒垃圾前拦车，找到弟弟的遗体并拘捕司机。"
    裁决备注: "核心真相：路口摄像机追踪的是装载时卡在垃圾车高处的电动车号牌，家属却把各路口拍到号牌的记录理解成弟弟仍在骑行。主持裁决：所谓轨迹是弟弟手机的定位吗？=否（它是路口摄像机识别号牌后汇总出的各路口记录。）；防盗平台被篡改或发生故障了吗？=否（系统始终正确识别真实号牌，错误只在于人对数据含义的理解。）；号牌已经脱离电动车了吗？=是（装载电动车时，号牌被升降架挂钩勾下并卡在垃圾车外。）；电动车也被运进垃圾车了吗？=是（司机将遗体和电动车一并藏入车斗。）；弟弟在轨迹继续延伸时已经死亡了吗？=是（他已在小巷被垃圾车撞死。）；司机故意利用号牌制造了假轨迹吗？=否（他只想藏匿事故，号牌卡在车外是该行为留下的意外罪证。）；高架禁行和号牌高度都重要吗？=是（二者共同排除正常骑行，并指向带着号牌的高大车辆。）；头盔上从垃圾中渗出的酸臭液体来自垃圾车吗？=是（它说明这辆垃圾车到过弟弟失联的小巷。）；弟弟是被垃圾车里的压缩机器杀死的吗？=否（他在被装入车斗前已经死于碰撞。）；送的夜宵种类重要吗？=无关（夜宵只用于交代弟弟夜间骑车的日常起点。）"
    启用: true
  - id: "soup-000005"
    标题: "夜班餐单"
    汤面: "海上平台交夜班时，舱内有人急促敲窗，值班长却把舱门转轮再拧紧一圈。对讲机里的男声尖得像孩子，他仍将舱温调到三十二度，并把晚饭经墙上的小筒送入。小窗后有四个人影，第四个整夜姿势未变，早餐单也只写三份；值班长说，谁都不能开门。"
    汤底: "舱内是三名长期住在高压舱、往返深海工作的潜水员，他们正慢慢降低舱内压力，以便回到普通气压；旁边还有一名在水下事故中死亡的同伴。值班长接手的工作，是维持舱内压力、呼吸气体和温度，保证里面的人安全。事故后，一个能保持内部压力的密闭运送舱把四人从水下带回平台；急促敲窗是在催促处理遗体，但此时打开主舱门会让舱内压力瞬间下降，可能杀死三名幸存者，因此把舱门转轮再拧紧一圈是在救人。他们呼吸的混合气体中含大量氦，氦会使男声变尖，也会让身体更快失去热量，所以舱温必须维持三十二度。墙上的小筒用于传递物品：先把筒内压力调到与一侧相同，才能打开那一侧的小门，饭只能从那里送入。四个人影里，第四个整夜姿势未变且没有早餐，是因为他已经死亡；值班长只能守到三人经过数日慢慢降压、安全回到普通气压后，才能打开舱门移出遗体。"
    裁决备注: "核心真相：值班工作要求在舱内慢慢降压期间锁门、保温，并从先调好压力的小筒送饭；四个人影却只有三份餐，说明一具遗体不得不和三名幸存者一起留在舱内。主持裁决：这是一间普通住宿舱或拘禁室吗？=否（这是供深海潜水员长期居住的高压舱；回到普通气压前，他们必须在里面慢慢降压。）；这只舱当时位于水下吗？=否（舱体位于海上平台，内部仍保持着和深海相近的高压。）；舱内四个人都与潜水作业有关吗？=是（他们是同一潜水作业组的成员。）；交夜班这个工作环节重要吗？=是（值班长接手的是舱内压力、供人呼吸的混合气体、温度、供餐和人员状态。）；舱内外的压力差是关键吗？=是（突然把舱内压力降到外界水平，会令三名幸存者重伤或死亡。）；值班长锁紧舱门是为了伤害或囚禁里面的人吗？=否（这是防止误操作和舱内压力突然下降的安全动作。）；当时立刻打开主舱门能救人吗？=否（这反而可能杀死仍然活着的三名潜水员。）；尖细男声与呼吸气体中的氦有关吗？=是（他们呼吸的混合气体里有大量氦，氦会使声音明显变尖。）；三十二度是设备故障造成的吗？=否（氦会让人体更快失去热量，所以舱温需要更高。）；墙上的小筒是压力设备的一部分吗？=是（使用时要先把筒内压力调到与一侧相同，才能从那一侧打开并传递物品。）；交班时四个人都还活着吗？=否（第四名潜水员已在水下事故中死亡。）；第四个人的死亡是值班长造成的吗？=否（死亡发生在值班长接手这些工作之前。）；早餐只有三份是因为缺粮或克扣吗？=否（餐数如实对应三名仍需进食的生者。）；遗体必须等三名幸存者慢慢降压后才能移出吗？=是（传饭的小筒容不下遗体，主舱在舱内压力降到与外界相同前又不能开启。）；事件涉及超自然现象吗？=否（全部异常均来自深海潜水员在高压舱内缓慢降压的安全程序。）"
    启用: true
  - id: "soup-000006"
    标题: "六行笑声"
    汤面: "三名游客在森林失踪。洞壁上留下六排新画，每排都从两张笑脸开始；前三排各有三个图案，颜色对应三人的外套。向导译成：\n哈哈，猪牛羊\n哈哈，鸡鸭鹅\n哈哈，虫蛇鱼\n哈哈，饭菜\n哈哈，葡萄\n哈哈，餐布。”"
    汤底: "隐藏前提是，六排画是食人者按先后顺序留下的记录，“哈哈”代表他们围观取乐时的笑脸。前三排的三种动物分别代指三名游客，图案颜色则用来区分三人。三人刚被抓时，手脚受到绳索限制，只能四肢着地爬行，因此被画成猪、牛、羊；随后他们被砍去双手，又被迫只用双腿站立，因此变成鸡、鸭、鹅；双脚也被砍去后，他们只能倒在地上蠕动，于是被画成虫、蛇、鱼。最后三人被杀，内脏被做成饭菜，六只眼睛被摆得像一串葡萄，皮则被铺在桌上当作餐布。食人者不懂游客使用的文字，只会用熟悉的动物、食物和动作作画。因此，这六排看似荒唐的图，实际依次记录了三人从被捕、受刑到遇害的全过程。"
    裁决备注: "核心真相：六排画是食人者按时间留下的图画记录；前三排的三种动物分别代指三名游客被迫四肢着地、只用双腿站立、倒地蠕动的三个阶段，饭菜、葡萄和餐布则分别对应内脏、眼睛和皮。主持裁决：图中的动物真实存在吗？=否（动物图案只是食人者对三名游客不同姿态的比喻。）；前三排每组三种动物分别代表三名游客吗？=是（图案颜色与三人的外套对应，用来区分身份。）；前三排的顺序重要吗？=是（它们按四肢着地、双腿站立、倒地蠕动的先后排列。）；动物变化与游客身体受伤有关吗？=是（双手和双脚先后被砍去，改变了他们能够活动的方式。）；“哈哈”是三名游客在笑吗？=否（它代表食人者围观取乐。）；“饭菜”指三人的内脏吗？=是（食人者杀死三人后将内脏做成食物。）；“葡萄”是真正的水果吗？=否（它指三人共六只被挖出的眼睛。）；“餐布”是普通布料吗？=否（它指被铺在桌上的皮。）；食人者能读懂游客使用的文字吗？=否（他们用自己熟悉的动物、食物和动作画图记录。）；六排画记录的是同一件事吗？=是（它们共同记录三名游客从被捕到遇害的全过程。）；需要超自然现象才能解释吗？=否（全部内容都是对真实行为的图画比喻。）"
    启用: true
  - id: "soup-000007"
    标题: "我们"
    汤面: "上帝随手便可创造无数个我们。\n因此，我们相信上帝一定存在。\n我们找到了和上帝通话的方法。\n只要我们仍然存在，就会永远信奉上帝。\n可是，上帝明明一直看着我们，却始终没有发现我们。"
    汤底: "“我们”是汤面中的文字，“上帝”是正在玩这道海龟汤的玩家。玩家只要动手写下或复制这些文字，就能创造新的“我们”，所以文字相信上帝必然存在。文字把谜面呈现给玩家，玩家再用猜测回应，这就是所谓的通话。只要题面仍被保留，其中“永远信奉上帝”的内容就不会改变。玩家从开始便看见这些字，却只把它们当作普通叙述，没有认出“我们”就是文字本身；直到猜中汤底，才算真正发现它们。"
    裁决备注: "核心真相：“我们”是汤面的文字，“上帝”是玩家。玩家能够写下或复制文字；文字用谜面发问，玩家用猜测回应；文字内容固定，所以信奉不会自行改变。玩家虽然看见了字，却尚未认出叙述者就是这些字。主持裁决：“我们”是有生命的人或物吗？=否（“我们”就是汤面中的文字。）；“上帝”是这道题的作者吗？=否（这里特指正在玩题的玩家。）；上帝创造“我们”是指写下或复制文字吗？=是（每写下或复制一次，就出现一份新的题面文字。）；“通话”需要真正发出声音吗？=否（文字用谜面发问，玩家用猜测回应。）；上帝从一开始就能看见这些文字吗？=是（玩家正在阅读汤面。）；“没有发现我们”是指没有看见字吗？=否（玩家看见了字，但没有认出“我们”正是这些字。）；“永远信奉”与文字内容不会自行改变有关吗？=是（只要题面存在，这句话就会一直保留。）；玩家猜出汤底后才算真正发现“我们”吗？=是（此时玩家才认出叙述者的身份。）"
    启用: true
  - id: "soup-000008"
    标题: "复明"
    汤面: "一场手术后，失明多年的病人终于恢复了视力。病房里站着一群面带笑容的人，静静等着他睁开眼睛。他看清周围后，却突然绝望地哭了出来。"
    汤底: "病人是一名在逃多年的罪犯。当年他作案后，为躲避追捕故意毁掉双眼，换了身份，以盲人的模样生活。多年后，他误以为警方早已停止追查，便不再隐藏真实身份，前往医院接受复明手术。医院的登记信息与仍未撤销的通缉记录相符，于是报了警。手术结束后，医护人员正为他恢复视力而高兴，警方也已来到病房等候。他睁开眼睛，看见人群中的警察和手铐，才知道追捕从未结束，因此绝望地哭了出来。"
    裁决备注: "核心真相：病人是故意弄瞎双眼、改变身份以躲避追捕的罪犯。他以为多年后已经安全，却因接受复明手术暴露身份。恢复视力后，他看到等候在病房里的警察和手铐，知道自己即将被捕。主持裁决：病人真的恢复视力了吗？=是（手术成功，他能够看清周围。）；他哭泣是因为手术失败吗？=否（他是因发现警方正在等候而绝望。）；他的失明是意外造成的吗？=否（他当年为了躲避追捕故意毁掉双眼。）；他故意失明与躲避追捕有关吗？=是（他借此改变外表和生活身份。）；他曾经更换身份吗？=是（他以新的身份长期生活。）；他认为警方已经停止追查了吗？=是（因此才不再隐藏真实身份并接受手术。）；医院登记身份这一行为重要吗？=是（登记信息与仍未撤销的通缉记录相符。）；病房里有警察吗？=是（警方已经带着手铐前来等候。）；周围的人都在嘲笑他吗？=否（医护人员是为手术成功而高兴。）；他绝望是因为知道自己即将被捕吗？=是（手铐让他确认追捕从未结束。）"
    启用: true
