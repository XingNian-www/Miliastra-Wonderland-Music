# Miliastra Wonderland Music 配置
# 坐标沿用旧脚本习惯：以游戏客户区左上角为原点，按 1920x1080 有效画面写坐标

# 配置版本；程序启动时会把旧版本配置迁移到当前模板
config_version: 17

window:
  # 目标游戏进程名，按进程文件名匹配，大小写不敏感；多个进程名可用逗号分隔
  target_process: yuanshen.exe,GenshinImpact.exe
  # 配置坐标对应的游戏有效画面宽度
  content_width: 1920
  # 配置坐标对应的游戏有效画面高度
  content_height: 1080
  # /active-window 接口是否尝试自动切回目标窗口
  auto_activate_window: false
  # 全局安全聚焦点，只在业务入口显式激活/聚焦游戏窗口时使用一次
  focus_point:
    x: 1919
    y: 1000

screen:
  # 截图会缩放到这个宽度后再做模板匹配和 OCR
  expected_width: 1920
  # 截图会缩放到这个高度后再做模板匹配和 OCR
  expected_height: 1080
  # 截图尺寸和预期不一致时是否记录 warning
  warn_on_size_mismatch: true
  # 聊天区域，用于匹配蓝/黄/粉聊天标志和 OCR 聊天文本
  chat_rect:
    x: 39
    y: 879
    width: 416
    height: 143
  # 一级聊天界面左下角回车按钮模板检测区域
  enter_rect:
    x: 60
    y: 1015
    width: 120
    height: 55
  # 二级大厅/面板界面模板检测区域
  secondary_hall_rect:
    x: 10
    y: 190
    width: 65
    height: 55
  # F2 大厅页顶部大厅名称 OCR 区域
  hall_name_rect:
    x: 75
    y: 425
    width: 325
    height: 40
  # F2 大厅页剩余时间 OCR 区域，只保留识别到的分钟数字
  hall_time_rect:
    x: 430
    y: 520
    width: 110
    height: 40

timing:
  # 1. 监听子进程异常退出后的重启等待时间，单位毫秒
  watchdog_restart_ms: 2000
  # 2. 监听主循环空转间隔；脚本暂停或每轮扫描结束后等待多久再继续，单位毫秒
  loop_idle_ms: 60
  chat_scan:
    # 聊天 OCR 兜底扫描间隔；画面没变化时按这个间隔强制扫描一次，单位毫秒
    fallback_ms: 2000
    # 聊天变化后等待画面稳定再 OCR 的时间，单位毫秒
    change_debounce_ms: 120
    # 两次变化触发 OCR 之间的最小间隔，单位毫秒
    change_cooldown_ms: 250
  command:
    # 执行命令前等待回到一级界面的最长时间，单位毫秒
    ui_timeout_ms: 15000
    # 返回一级界面时每次 ESC 后等待重新检测的基础时间；连续失败后会递增，超过 5 次固定为 2000ms
    return_retry_ms: 1000
    # 命令执行后等待聊天列表/动画稳定再复扫的时间，单位毫秒
    post_settle_ms: 500
    # @帮助 多条消息之间的间隔，单位毫秒
    help_batch_ms: 500
  input:
    # 自动激活游戏窗口后等待前台窗口切换完成的时间，单位毫秒
    after_activate_ms: 200
    # 手动调试工具在显式聚焦游戏窗口后的等待时间，单位毫秒
    focus_ms: 300
    # 按回车打开聊天输入后的等待时间，单位毫秒
    open_chat_ms: 300
    # 每次点击聊天输入区域后的等待时间，单位毫秒
    click_ms: 150
    # 输入文本后到发送前的等待时间，单位毫秒
    text_ms: 250
    # 发送聊天后等待界面稳定的时间，单位毫秒
    send_ms: 300
  workflow:
    # wait_template/click_template 默认等待模板出现的最长时间，单位毫秒
    default_timeout_ms: 5000
    # 等待模板出现时的轮询间隔，单位毫秒
    default_poll_ms: 200
    # 每个步骤执行后的默认等待时间，单位毫秒
    default_step_wait_ms: 300
  hall:
    # 进入/退出大厅页面后等待页面稳定的时间，单位毫秒
    page_settle_ms: 800
    # 大厅信息多次 OCR 采样之间的间隔，单位毫秒
    ocr_sample_interval_ms: 120
  invite:
    # 邀请流程打开好友/聊天面板前后的固定等待，单位毫秒
    open_chat_ms: 400
    # 邀请流程每一步点击后的等待时间，单位毫秒
    step_ms: 800
    # 非公共大厅邀请时等待邀请确认/拒绝命令的最长时间，单位毫秒
    confirm_timeout_ms: 30000
    # 邀请确认扫描间隔，单位毫秒
    confirm_poll_ms: 2000
  moderation:
    # 拉黑/屏蔽 UID 请求的好友私聊投票等待时间，单位毫秒
    vote_timeout_ms: 120000
    # 投票 OCR 扫描间隔，单位毫秒
    vote_poll_ms: 2000
    # 点击 UID 搜索按钮后等待搜索结果出现的最长时间，单位毫秒
    search_result_timeout_ms: 5000
    # 点击确认按钮后等待动作完成的时间，单位毫秒
    confirm_wait_ms: 2000
  playback:
    # 点歌搜索发起后等待播放器切歌的时间，单位毫秒
    search_settle_ms: 2000
    # 点歌后查询播放状态的间隔，单位毫秒
    status_poll_ms: 1000
    # 点歌后最多查询播放状态次数
    status_retries: 15
    # 下一首/上一首后首次查询播放器状态前的等待时间，单位毫秒
    skip_status_initial_ms: 500
    # 下一首/上一首后轮询播放器状态的间隔，单位毫秒
    skip_status_poll_ms: 300
    # 下一首/上一首后最多查询播放状态次数
    skip_status_retries: 5
    # 播放监控线程循环间隔，单位毫秒
    monitor_tick_ms: 200
    # 播放结束监控向 FeelUOwn 校准状态的间隔，单位毫秒
    monitor_status_ms: 1000
  decision:
    # 匹配失败/AI 自动匹配后等待用户确认的最长时间，单位毫秒
    timeout_ms: 20000
    # 匹配失败/AI 自动匹配期间扫描确认命令的间隔，单位毫秒
    poll_ms: 2000
  external:
    # FeelUOwn TCP RPC 读写超时，单位毫秒
    feeluown_rpc_timeout_ms: 10000
    # 调整音量时每个平滑步进之间的等待时间，单位毫秒
    volume_smooth_step_ms: 300
    # AI HTTP 请求超时，单位毫秒
    ai_request_timeout_ms: 35000

ocr:
  # PaddleOCR 检测模型路径
  det_model: models/PP-OCRv6_small_det.mnn
  # PaddleOCR 识别模型路径
  rec_model: models/PP-OCRv6_small_rec.mnn
  # PaddleOCR 字符集路径
  charset: models/ppocr_keys_v6_small.txt
  # OCR 最低置信度，低于该值的结果会被过滤
  min_confidence: 0.9
  # OCR 线程数
  threads: 4
  # OCR 后端优先级；可用值: cuda, vulkan, opencl, cpu。默认只使用 CPU OCR
  backend_priority:
    - cpu
  # 检测模型最长边限制；保持 960 与 PaddleOCR/BetterGI 常用配置一致
  det_max_side_len: 960
  # 检测分割阈值；越低越容易检出细小文字，也更容易产生噪声框
  det_score_threshold: 0.3
  # 文本框外扩比例；2.0 更接近 BetterGI，减少裁掉边缘字符
  det_unclip_ratio: 2.0
  # 最小文本框面积；小聊天文字用较低值，避免漏掉短命令
  det_min_area: 9
  # OCR 库额外裁剪边框；BetterGI 主要依赖 unclip 外扩，这里关闭额外扩边
  det_box_border: 0
  # 聊天区缩略图平均像素差超过该值时认为画面有变化
  change_mean_threshold: 6.0
  # 聊天区缩略图变化像素比例超过该值时认为画面有变化
  change_pixel_threshold: 0.03
  # 聊天标志右侧到文本区域的间距
  text_left_gap: 8
  # 聊天消息块顶部向上扩展像素
  block_top_padding: 2
  # 聊天消息块底部向上收缩像素，避免吃到下一条标志
  block_bottom_padding: 2
  # 单条聊天消息 OCR 块最大高度
  max_block_height: 120
  # OCR 结果合并为同一行的 Y 轴容差
  same_line_y_tolerance: 10
  # 聊天标志去重 X 轴容差
  marker_dedupe_x: 8
  # 聊天标志去重 Y 轴容差
  marker_dedupe_y: 8
  # 判定下一条聊天标志的最小 Y 轴间隔
  next_marker_min_gap: 12
  # 聊天文本区域右侧留白
  right_padding: 4
  # 实验性：将聊天块拼接为单张图片一次性 OCR，减少推理次数
  batch_recognize: false

templates:
  # 蓝色聊天标志模板，通常是自己/普通聊天行标志
  blue_marker: assets/chat-marker-blue.png
  # 黄色聊天标志模板，通常是系统/高亮聊天行标志
  yellow_marker: assets/chat-marker-yellow.png
  # 粉色聊天标志模板，用于识别好友私聊命令
  pink_marker: assets/chat-marker-pink.png
  # 一级聊天界面的回车按钮模板
  enter: assets/ui-primary-enter.png
  # 二级大厅/面板界面模板
  secondary_hall: assets/ui-secondary-hall.png
  # 邀请流程里的“查看千星”按钮模板
  invite_view_star: assets/invite-view-star.png
  # 邀请流程里的“前往其大厅”按钮模板
  invite_goto_hall: assets/invite-goto-hall.png
  # 邀请流程里的“进入大厅”按钮模板
  invite_enter_hall: assets/invite-enter-hall.png
  # 好友界面模板，用于 UID 拉黑/屏蔽流程
  friend_panel: assets/friend-panel.png
  # 好友搜索界面模板
  friend_search_panel: assets/friend-search-panel.png
  # 好友搜索结果里的更多设置按钮模板
  friend_more_settings: assets/friend-more-settings.png
  # 更多设置里的屏蔽聊天按钮模板
  friend_block_chat: assets/friend-block-chat.png
  # 更多设置里的拉黑按钮模板
  friend_blacklist: assets/friend-blacklist.png
  # 拉黑/屏蔽弹窗里的确认按钮模板
  friend_confirm: assets/friend-confirm.png
  # UI/聊天标志模板匹配阈值，越高越严格
  marker_threshold: 0.9

output:
  # 是否真的向游戏内发送回复；false 时只写日志
  send_enabled: true
  # 保留给手动调试工具使用的聊天面板安全点击点；自动流程返回一级只使用 ESC
  focus_point:
    x: 1919
    y: 1000
  # 打开聊天输入后的第一次点击位置
  chat_click_1:
    x: 120
    y: 225
  # 打开聊天输入后的第二次点击位置，通常是输入框位置
  chat_click_2:
    x: 600
    y: 1013

moderation:
  # 同一好友同一判决需要连续稳定识别次数
  stable_vote_samples: 3
  # 同意人数 - 不同意人数 达到该值才执行
  required_vote_margin: 3
  # 好友界面模板搜索区域
  friend_panel_region:
    x: 770
    y: 20
    width: 75
    height: 50
  # 搜索按钮模板搜索区域；命中后会点击按钮左侧 500 像素处粘贴 UID，再点击按钮
  search_panel_region:
    x: 1600
    y: 100
    width: 240
    height: 90
  # UID 搜索输入框点击点
  search_input_point:
    x: 1180
    y: 135
  # UID 搜索按钮点击点
  search_button_point:
    x: 1680
    y: 135
  # 更多设置按钮模板搜索区域
  more_settings_region:
    x: 1140
    y: 180
    width: 80
    height: 70
  # 屏蔽聊天按钮模板搜索区域
  block_chat_region:
    x: 1240
    y: 130
    width: 440
    height: 505
  # 拉黑按钮模板搜索区域
  blacklist_region:
    x: 1240
    y: 130
    width: 440
    height: 505
  # 拉黑/屏蔽弹窗确认按钮模板搜索区域
  confirm_region:
    x: 900
    y: 700
    width: 500
    height: 100
feeluown:
  # FeelUOwn TCP RPC 地址
  host: 127.0.0.1
  # FeelUOwn TCP RPC 端口
  port: 23333

http:
  # Web/API 面板监听地址
  host: 127.0.0.1
  # Web/API 面板端口
  port: 18888
  # 是否启用 Web/API 面板
  enabled: true

logging:
  # 日志目录
  dir: logs
  # 日志级别：error/warn/info/debug/trace
  level: info

tui:
  # 是否启用终端 TUI 面板；启用后实时显示事件日志、OCR 内容和队列状态
  enabled: true
  # TUI 刷新间隔，单位毫秒
  refresh_ms: 100
  # TUI 保留最近多少行日志
  log_lines: 200

state:
  # 运行时状态持久化路径
  runtime_state_path: data/runtime-state.json
  # 点歌队列持久化路径
  queue_path: data/queue.json
  # 最终执行命令记录路径
  executed_commands_log_path: data/executed-commands.log

queue:
  # 队列最大长度
  max_size: 5
  # 当前歌曲剩余多少秒以内自动播放队列下一首
  auto_advance_seconds: 1
  # 队列自动播出的歌曲是否保护；true 时新点歌会排队，false 时可直接替换
  protect_auto_played_songs: true
  # 任意渠道正在播放/暂停的歌曲是否保护；true 时新点歌会排队，未结束只能用 @下一首 提前切换；自动出队仍由 auto_advance_seconds 控制
  protect_current_song_until_finished: true

ai:
  # AI 供应商：mimo/openai/deepseek/custom
  provider: mimo
  # AI API Key，留空表示 AI 功能未启用
  api_key: ""
  # 自定义 OpenAI-compatible chat completions 地址；custom 必填，其他供应商留空使用默认地址
  endpoint: ""
  # AI 模型名；留空使用供应商默认模型，不同供应商可自行填写
  model: ""

matching:
  # 歌名最低匹配分数
  min_song_name_score: 0.5
  # 4 字以内中文歌名最多允许漏字数
  short_chinese_song_max_miss: 1
  # 长中文歌名最低命中比例
  long_chinese_song_min_score: 0.5
  # 完整歌名后最多忽略的 OCR 噪声字符数
  max_ocr_noise_chars: 1
  # 是否启用中文歌手模糊匹配
  enable_fuzzy_singer: true
  # 4 字以内中文歌手最多允许漏字数
  short_chinese_singer_max_miss: 1
  # 长中文歌手最低命中比例
  long_chinese_singer_min_score: 0.8
  # 英文歌名编辑距离占比上限
  en_max_edit_fraction: 0.3
  # 英文歌手编辑距离占比上限
  en_singer_max_edit_fraction: 0.35

hotkeys:
  # 是否启用全局热键
  enabled: true
  # 暂停/恢复热键
  pause_key: F7
  # 退出热键
  exit_key: F12

startup:
  # 程序启动后是否自动排队执行“启动游戏并进入千星奇域”
  enabled: true
  # 找不到游戏窗口时是否启动游戏
  launch_game: true
  # 是否处理“进入游戏/确认”等开门按钮
  enter_game: true
  # 是否按 F6 打开千星奇域，并进入大厅后停止
  enter_wonderland: true
  # 启动 EXE 路径；可填完整 exe 文件路径，也可填 exe 所在目录；留空时自动从米哈游启动器注册表查找官服/国际服
  exe_path: ""
  # 启动游戏时附加的命令行参数
  game_args: ""
  # 启动游戏后每次等待窗口出现的时间，单位毫秒
  launch_wait_ms: 5000
  # 启动游戏后最多检查窗口次数
  launch_retries: 12
  # 仅开门模式等待进入游戏完成的最长时间，单位毫秒
  enter_game_timeout_ms: 300000
  # 等待千星奇域界面/大厅确认的最长时间，单位毫秒
  enter_wonderland_timeout_ms: 300000
  # 点击前往大厅后等待回到可聊天一级界面的最长时间，单位毫秒
  final_primary_timeout_ms: 120000
  # 启动流程 OCR/截图轮询间隔，单位毫秒
  poll_ms: 1000
  # 未检测到千星奇域界面时重复按 F6 的间隔，单位毫秒
  f6_retry_ms: 2500
  # 点击后等待局部像素稳定的最长时间，单位毫秒
  stable_timeout_ms: 3000
  # 像素稳定平均差阈值
  stable_mean_threshold: 2.0
  # 像素稳定变化比例阈值
  stable_changed_ratio_threshold: 0.01
  # BGI 启动模板匹配阈值；越高越严格
  template_threshold: 0.8
  # BGI 启动流程模板资源
  templates:
    choose_enter_game: assets/startup-choose-enter-game.png
    enter_game: assets/startup-enter-game.png
    welkin_moon_logo: assets/startup-welkin-moon-logo.png
    girl_moon: assets/startup-girl-moon.png
    confirm_black: assets/startup-confirm-black.png
    confirm_white: assets/startup-confirm-white.png
    paimon_menu: assets/startup-paimon-menu.png
    primogem: assets/startup-primogem.png
    wonderland_close: assets/startup-wonderland-close.png
    wonderland_enter: assets/startup-wonderland-enter.png
  # “进入游戏”按钮 OCR 文本，按顺序匹配，点击文本框中心
  enter_game_texts: [进入游戏, Enter Game, Start Game]
  # 启动/适龄/协议等弹窗确认按钮 OCR 文本
  prompt_confirm_texts: [确认, 确定, 同意, OK]
  # 千星奇域主页 OCR 文本；检测到后点击下方配置的奇域卡片坐标
  wonderland_home_texts: [千星奇域, 奇域]
  # 选中奇域后进入大厅按钮 OCR 文本
  wonderland_enter_texts: [前往大厅, 进入大厅, 大厅]
  # 顶号/切号后的二次进入游戏按钮模板区域
  choose_enter_game_region:
    x: 700
    y: 540
    width: 520
    height: 360
  # 开门按钮 OCR 区域
  enter_game_text_region:
    x: 500
    y: 560
    width: 920
    height: 480
  # 月卡、原石等启动弹窗模板区域
  loading_popup_region:
    x: 560
    y: 420
    width: 800
    height: 560
  # 弹窗确认按钮 OCR 区域
  prompt_confirm_text_region:
    x: 560
    y: 500
    width: 800
    height: 420
  # 派蒙菜单/主界面模板区域
  main_ui_region:
    x: 0
    y: 0
    width: 480
    height: 270
  # 千星奇域主页标题 OCR 区域
  wonderland_home_text_region:
    x: 0
    y: 0
    width: 1920
    height: 360
  # 前往大厅按钮 OCR 区域
  wonderland_enter_text_region:
    x: 560
    y: 620
    width: 800
    height: 360
  # F6 打开的千星奇域主页关闭/返回模板区域
  wonderland_close_region:
    x: 0
    y: 0
    width: 1920
    height: 220
  # 默认点击第一个奇域卡片的位置，按 1920x1080 坐标
  wonderland_card_point:
    x: 680
    y: 310

invite:
  # 好友列表 OCR 区域，用于查找发起邀请的用户名
  friend_list_region:
    x: 80
    y: 280
    width: 170
    height: 600
  # 邀请确认列表 OCR 区域
  confirm_list_region:
    x: 400
    y: 160
    width: 180
    height: 900
  # “查看千星”模板搜索区域
  view_star_region:
    x: 400
    y: 80
    width: 440
    height: 860
  # “前往其大厅”模板搜索区域
  goto_hall_region:
    x: 700
    y: 560
    width: 500
    height: 300
  # “进入大厅”模板搜索区域
  enter_hall_region:
    x: 700
    y: 700
    width: 500
    height: 100

custom_workflows:
  # 是否启用配置驱动的自定义流程命令
  enabled: true
  # 模板默认匹配阈值
  default_threshold: 0.9
  wait_template_absent_stable_default: true
  # 自定义流程默认超时、轮询和步骤等待统一在 timing.workflow 中配置
  # 自定义模板名到图片路径的映射，步骤里通过 template 引用这里的名字
  templates: {}
  # 支持的步骤：activate_game/focus_game/key/click/click_template/wait_template/wait_template_absent/wait_stable/click_text/wait_text/paste/send_chat/send_current_chat/send_friend_message/invite_user/return_primary/sleep
  # wait_template_absent 默认在模板消失后继续等待像素稳定；可在步骤上设置 stable_after_absent: false 关闭
  # wait_stable 会等待 region 内像素变化稳定，适合点击后等待面板动画结束
  # 支持变量：{{username}}、{{args}}、{{arg1}}、{{arg2}}、{{command}}、{{workflow}}、{{message_type}}
  # send_friend_message 默认发送给触发命令的好友，也可以用 target 指定好友名
  # confirm_message_types 控制确认命令来源：[blue] 为大厅，[pink] 为好友私聊，留空表示不限
  # 默认自定义流程不接受参数；需要参数时设置 allow_args: true
  # 示例：
  # templates:
  #   my_button: assets/my-button.png
  # workflows:
  #   - name: example
  #     enabled: true
  #     commands: [测试流程]
  #     allow_args: true
  #     message_types: [blue]
  #     confirm_before_run: false
  #     confirm_message: "{{username}} 请求执行测试流程 {{args}},@确认@跳过"
  #     confirm_message_types: [blue]
  #     confirm_timeout_ms: 20000
  #     confirm_poll_ms: 2000
  #     success_message: ""
  #     steps:
  #       - type: key
  #         key: F2
  #         wait_ms: 800
  #       - type: click_template
  #         template: my_button
  #         region: { x: 700, y: 560, width: 500, height: 300 }
  #       - type: send_chat
  #         message: "{{username}} 触发了测试流程 {{args}}"
  #       - type: return_primary
  workflows:
    # 参考命令：好友私聊 @过来，效果等同内置 @邀请N 命令，邀请 BOT 前往该好友大厅
    - name: invite_reference
      enabled: true
      commands: [过来]
      allow_args: false
      message_types: [pink]
      confirm_before_run: false
      confirm_message: ""
      confirm_message_types: [blue]
      success_message: ""
      steps:
        - type: invite_user
    # 好友私聊 @通告 内容，向当前大厅发送“内容”
    - name: notice
      enabled: true
      commands: [通告]
      allow_args: true
      message_types: [pink]
      confirm_before_run: false
      confirm_message: ""
      confirm_message_types: []
      success_message: ""
      steps:
        - type: send_chat
          message: "{{args}}"
