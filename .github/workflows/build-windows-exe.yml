name: Build Windows exe

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0. Empty uses Cargo.toml version.
        required: false
        type: string
  push:
    branches:
      - main
      - dev
    paths:
      - Cargo.toml

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  LIBCLANG_PATH: C:\Program Files\LLVM\bin
  OCR_MODEL_BASE_URL: https://raw.githubusercontent.com/zibo-chen/rust-paddle-ocr/next/models

jobs:
  build-windows-exe:
    name: Build Windows x64 exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Cargo package version change
        id: build_gate
        shell: pwsh
        run: |
          function Read-PackageVersion($text) {
            if ($text -notmatch '(?ms)^\[package\].*?^version\s*=\s*"([^"]+)"') {
              throw 'Cannot read package version from Cargo.toml'
            }
            return $Matches[1]
          }

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            'should_build=true' >> $env:GITHUB_OUTPUT
            'reason=manual dispatch' >> $env:GITHUB_OUTPUT
            exit 0
          }

          $before = '${{ github.event.before }}'
          if (-not $before -or $before -match '^0+$') {
            'should_build=true' >> $env:GITHUB_OUTPUT
            'reason=no previous commit' >> $env:GITHUB_OUTPUT
            exit 0
          }

          git fetch --no-tags --depth=1 origin $before
          $oldCargo = git show "$($before):Cargo.toml"
          $oldVersion = Read-PackageVersion $oldCargo
          $newVersion = Read-PackageVersion (Get-Content Cargo.toml -Raw)

          if ($oldVersion -ne $newVersion) {
            'should_build=true' >> $env:GITHUB_OUTPUT
            "reason=version $oldVersion -> $newVersion" >> $env:GITHUB_OUTPUT
          } else {
            'should_build=false' >> $env:GITHUB_OUTPUT
            "reason=package version unchanged ($newVersion)" >> $env:GITHUB_OUTPUT
          }

      - name: Skip build
        if: steps.build_gate.outputs.should_build != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping build: ${{ steps.build_gate.outputs.reason }}"

      - name: Install Rust
        if: steps.build_gate.outputs.should_build == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        if: steps.build_gate.outputs.should_build == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc-release

      - name: Cache OCR models
        if: steps.build_gate.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: models
          key: pp-ocrv6-small-models-v1

      - name: Download PP-OCRv6 small models
        if: steps.build_gate.outputs.should_build == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path models | Out-Null
          $files = @(
            'PP-OCRv6_small_det.mnn',
            'PP-OCRv6_small_rec.mnn',
            'ppocr_keys_v6_small.txt'
          )
          foreach ($file in $files) {
            $path = "models/$file"
            if (-not (Test-Path $path)) {
              Invoke-WebRequest -Uri "$env:OCR_MODEL_BASE_URL/$file" -OutFile $path
            }
          }

      - name: Build release exe
        if: steps.build_gate.outputs.should_build == 'true'
        run: cargo build --release --target x86_64-pc-windows-msvc --locked

      - name: Resolve release version
        if: steps.build_gate.outputs.should_build == 'true'
        id: version
        shell: pwsh
        run: |
          $inputVersion = '${{ github.event.inputs.version }}'.Trim()
          if ($inputVersion) {
            $version = $inputVersion
          } else {
            $cargoToml = Get-Content Cargo.toml -Raw
            if ($cargoToml -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
              throw 'Cannot read package version from Cargo.toml'
            }
            $version = "v$($Matches[1])"
          }
          if (-not $version.StartsWith('v')) {
            $version = "v$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip=miliastra-wonderland-music-windows-x64-$version.zip" >> $env:GITHUB_OUTPUT

      - name: Prepare artifact
        if: steps.build_gate.outputs.should_build == 'true'
        shell: pwsh
        run: |
          $dist = 'dist/miliastra-wonderland-music-windows-x64'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item 'target/x86_64-pc-windows-msvc/release/miliastra-wonderland-music.exe' $dist
          Copy-Item 'target/x86_64-pc-windows-msvc/release/MNN.dll' $dist
          Copy-Item 'assets' $dist -Recurse
          Copy-Item 'models' $dist -Recurse
          Copy-Item 'config.yaml' $dist
          Copy-Item 'README.md' $dist

      - name: Package release zip
        if: steps.build_gate.outputs.should_build == 'true'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path 'dist/miliastra-wonderland-music-windows-x64' `
            -DestinationPath "dist/${{ steps.version.outputs.zip }}" `
            -Force

      - name: Upload artifact
        if: steps.build_gate.outputs.should_build == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: miliastra-wonderland-music-windows-x64
          path: dist/miliastra-wonderland-music-windows-x64

      - name: Create GitHub Release
        if: steps.build_gate.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Miliastra Wonderland Music ${{ steps.version.outputs.version }}
          files: dist/${{ steps.version.outputs.zip }}
          generate_release_notes: true
