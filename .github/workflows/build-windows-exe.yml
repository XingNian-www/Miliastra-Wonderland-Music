name: 构建 Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本，例如 v0.1.0。留空时使用 Cargo.toml 版本。
        required: false
        type: string
  push:
    branches:
      - main
      - dev
      - v2
    paths:
      - .cargo/**
      - .github/workflows/build-windows-exe.yml
      - Cargo.toml
      - Cargo.lock
      - README.md
      - THIRD_PARTY_NOTICES.md
      - assets/**
      - config.yaml
      - turtle_soup.example.yaml
      - src/**
      - vendor/mnn/3.6.0/windows-x64/**

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  LIBCLANG_PATH: C:\Program Files\LLVM\bin
  OCR_MODEL_BASE_URL: https://raw.githubusercontent.com/zibo-chen/rust-paddle-ocr/next/models

jobs:
  build-windows-exe:
    name: 构建 Windows x64 EXE
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc-release

      - name: 缓存 OCR 模型
        uses: actions/cache@v4
        with:
          path: models
          key: pp-ocrv6-small-models-v1

      - name: 下载 PP-OCRv6 small 模型
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path models | Out-Null
          $files = @(
            'PP-OCRv6_small_det.mnn',
            'PP-OCRv6_small_rec.mnn',
            'ppocr_keys_v6_small.txt'
          )
          foreach ($file in $files) {
            $path = "models/$file"
            if (-not (Test-Path $path)) {
              Invoke-WebRequest -Uri "$env:OCR_MODEL_BASE_URL/$file" -OutFile $path
            }
          }

      - name: 编译 Release EXE
        run: cargo build --release --target x86_64-pc-windows-msvc --locked

      - name: 解析发布版本
        id: version
        shell: pwsh
        run: |
          function Read-PackageVersion($text) {
            $content = if ($text -is [array]) { $text -join "`n" } else { [string]$text }
            if ($content -notmatch '(?ms)^\[package\].*?^version\s*=\s*"([^"]+)"') {
              throw '无法从 Cargo.toml 读取包版本'
            }
            return $Matches[1]
          }

          $inputVersion = '${{ github.event.inputs.version }}'.Trim()
          $cargoToml = Get-Content Cargo.toml -Raw
          $packageVersion = Read-PackageVersion $cargoToml
          if ($inputVersion) {
            $version = $inputVersion
          } else {
            $version = "v$packageVersion"
          }
          if (-not $version.StartsWith('v')) {
            $version = "v$version"
          }
          $createRelease = 'true'
          if ('${{ github.event_name }}' -eq 'push') {
            $createRelease = 'false'
            $before = '${{ github.event.before }}'
            if (-not $before -or $before -match '^0+$') {
              $createRelease = 'true'
            } else {
              git fetch --no-tags --depth=1 origin $before
              $oldCargo = git show "$($before):Cargo.toml"
              $oldVersion = Read-PackageVersion $oldCargo
              if ($oldVersion -ne $packageVersion) {
                $createRelease = 'true'
              }
            }
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip=miliastra-wonderland-music-windows-x64-$version.zip" >> $env:GITHUB_OUTPUT
          "create_release=$createRelease" >> $env:GITHUB_OUTPUT

      - name: 准备产物
        shell: pwsh
        run: |
          $dist = 'dist/miliastra-wonderland-music-windows-x64'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item 'target/x86_64-pc-windows-msvc/release/miliastra-wonderland-music.exe' $dist
          Copy-Item 'vendor/mnn/3.6.0/windows-x64/bin/MNN.dll' $dist
          Copy-Item 'assets' $dist -Recurse
          Copy-Item 'models' $dist -Recurse
          Copy-Item 'config.yaml' $dist
          Copy-Item 'turtle_soup.example.yaml' $dist
          Copy-Item 'README.md' $dist
          Copy-Item 'THIRD_PARTY_NOTICES.md' $dist

      - name: 打包 Release zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path 'dist/miliastra-wonderland-music-windows-x64' `
            -DestinationPath "dist/${{ steps.version.outputs.zip }}" `
            -Force

      - name: 上传产物
        uses: actions/upload-artifact@v5
        with:
          name: miliastra-wonderland-music-windows-x64
          path: dist/miliastra-wonderland-music-windows-x64

      - name: 创建 GitHub Release
        if: steps.version.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Miliastra Wonderland Music ${{ steps.version.outputs.version }}
          files: dist/${{ steps.version.outputs.zip }}
          generate_release_notes: true
